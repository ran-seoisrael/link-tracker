<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>כניסה — Link Tracker</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow login-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="login-icon mb-3">🔗</div>
        <h2 class="fw-bold">Link Tracker</h2>
        <p class="text-muted">מערכת ניהול קישורים</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">אימייל</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 placeholder="user@example.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">סיסמה</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">
          כניסה למערכת
        </button>
      </form>
    </div>
  </div>
</body>
</html>
