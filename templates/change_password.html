{% extends "base.html" %}
{% block title %}שינוי סיסמה — Link Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header bg-secondary text-white">
        <h5 class="mb-0"><i class="bi bi-shield-lock"></i> שינוי סיסמה</h5>
      </div>
      <div class="card-body p-4">

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">הסיסמה שונתה בהצלחה!</div>
        {% endif %}

        <form method="post" action="/change-password">
          <div class="mb-3">
            <label class="form-label fw-semibold">סיסמה נוכחית</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">סיסמה חדשה</label>
            <input type="password" name="new_password" class="form-control"
                   minlength="6" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">אימות סיסמה חדשה</label>
            <input type="password" name="confirm_password" class="form-control"
                   minlength="6" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">שמור סיסמה</button>
            <a href="/" class="btn btn-outline-secondary">ביטול</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
