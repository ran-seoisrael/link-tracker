<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Link Tracker{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% if user is defined and user %}
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#0d1b3e;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <img src="/static/SEOISRAELLOGO.png" height="36" alt="SEO Israel"
           onerror="this.style.display='none'">
      <span class="d-none d-sm-inline">Link Tracker</span>
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white-50 small">שלום, {{ user.name }}</span>
      <a href="/import" class="btn btn-sm btn-outline-light"><i class="bi bi-upload"></i> ייבוא</a>
      <a href="/change-password" class="btn btn-sm btn-outline-light">סיסמה</a>
      <a href="/logout" class="btn btn-sm btn-outline-light">יציאה</a>
    </div>
  </div>
</nav>
{% endif %}

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
